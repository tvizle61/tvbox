<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<title>Vizion Box</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mpegts.js/1.7.3/mpegts.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090e; --s1:#0b1018; --s2:#0f1520; --s3:#141c2a; --s4:#1a2335;
  --bd:#1d2333; --bd2:#263444;
  --acc:#00d4ff; --acc2:#ff3e3e; --acc3:#ffb800; --acc4:#00ff88;
  --txt:#dde2f0; --txt2:#8899bb; --txt3:#4a5468;
  --glow:rgba(0,212,255,.35); --glowr:rgba(255,62,62,.35);
  --fd:'Barlow Condensed',sans-serif; --fb:'Barlow',sans-serif;
  --r:8px; --r2:12px; --hw:62px; --sw:280px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--fb);}
button{cursor:pointer;font-family:var(--fb);}
input,select{font-family:var(--fb);}
*{scrollbar-width:thin;scrollbar-color:var(--bd) transparent;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}

/* ── SCREENS ── */
.screen{display:none;width:100%;height:100%;position:fixed;inset:0;z-index:1;}
.screen.on{display:flex;flex-direction:column;}

/* ══════════════════════════════════════════
   AUTH
══════════════════════════════════════════ */
#sAuth{align-items:center;justify-content:center;background:var(--bg);}
.auth-box{
  width:400px;max-width:95vw;
  background:var(--s1);border:1px solid var(--bd);border-radius:16px;
  padding:32px 28px;
  box-shadow:0 0 0 1px rgba(0,212,255,.08),0 40px 80px rgba(0,0,0,.7);
}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;}
.auth-logo-mark{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--acc),#0066ff);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 0 24px var(--glow);animation:ap 2.5s ease-in-out infinite;
}
@keyframes ap{0%,100%{box-shadow:0 0 24px var(--glow)}50%{box-shadow:0 0 44px rgba(0,212,255,.6)}}
.auth-logo-txt{
  font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(90deg,#fff,var(--acc));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.auth-tabs{display:flex;border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.auth-tab{flex:1;padding:9px;border:none;background:transparent;color:var(--txt2);font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:.5px;transition:all .2s;}
.auth-tab.on{background:var(--s3);color:var(--acc);}
.auth-form{display:none;}
.auth-form.on{display:block;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);margin-bottom:4px;}
.fg input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;color:var(--txt);font-size:13px;outline:none;transition:border-color .2s;}
.fg input:focus{border-color:var(--acc);}
.fg input::placeholder{color:var(--txt3);}
.auth-btn{width:100%;padding:12px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--acc),#0066ff);color:#000;font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:1px;transition:all .2s;box-shadow:0 0 18px var(--glow);margin-top:4px;}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,212,255,.6);}
.auth-err{background:rgba(255,62,62,.1);border:1px solid rgba(255,62,62,.3);border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--acc2);margin-top:8px;display:none;}
.auth-guest{text-align:center;margin-top:12px;font-size:11px;color:var(--txt3);}
.auth-guest a{color:var(--acc);text-decoration:underline;cursor:pointer;}

/* ══════════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════════ */
#sApp{flex-direction:column;}

/* HEADER */
.hdr{
  height:var(--hw);flex-shrink:0;
  display:flex;align-items:center;gap:4px;padding:0 14px;
  background:rgba(7,9,14,.97);border-bottom:1px solid var(--bd);
  position:relative;z-index:50;
}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc2),var(--acc),var(--acc3),var(--acc4));}
.hdr-logo{display:flex;align-items:center;gap:8px;margin-right:10px;flex-shrink:0;}
.hdr-logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--acc),#0055cc);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px var(--glow);animation:ap 2.5s ease-in-out infinite;}
.hdr-logo-txt{font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:2px;background:linear-gradient(90deg,#fff,var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-nav{display:flex;align-items:center;gap:2px;flex:1;overflow-x:auto;}
.hdr-nav::-webkit-scrollbar{height:0;}
.nav-tab{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--r);border:none;background:transparent;color:var(--txt2);font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.3px;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.nav-tab:hover{background:var(--s2);color:var(--txt);}
.nav-tab.on{background:var(--s3);color:var(--acc);}
.nav-tab svg{width:14px;height:14px;}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.hdr-live{display:flex;align-items:center;gap:5px;background:rgba(255,62,62,.1);border:1px solid rgba(255,62,62,.25);border-radius:20px;padding:4px 10px;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--acc2);}
.hdr-live .dot{width:6px;height:6px;border-radius:50%;background:var(--acc2);animation:bl 1.1s ease-in-out infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.hdr-clock{font-family:var(--fd);font-size:15px;color:var(--txt2);font-variant-numeric:tabular-nums;}
.hdr-user{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer;transition:all .2s;}
.hdr-user:hover{border-color:var(--acc);}
.hdr-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc3));display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;font-weight:800;color:#000;}
.hdr-uname{font-size:12px;font-weight:600;color:var(--txt2);}

/* HAMBURGER */
.hdr-ham{display:none;flex-direction:column;justify-content:center;gap:5px;background:none;border:none;padding:6px;border-radius:var(--r);margin-left:6px;}
.hdr-ham span{display:block;width:20px;height:2px;background:var(--txt2);border-radius:2px;transition:all .3s;}
.admin-login-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--s2);color:var(--txt2);font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.5px;transition:all .2s;cursor:pointer;white-space:nowrap;}
.admin-login-btn:hover{border-color:var(--acc3);color:var(--acc3);}
.admin-login-btn.on{border-color:var(--acc3);background:rgba(255,184,0,.1);color:var(--acc3);}
.hdr-ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hdr-ham.open span:nth-child(2){opacity:0;}
.hdr-ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* MOBILE DRAWER */
.mob-drawer{display:none;position:fixed;inset:0;z-index:200;}
.mob-drawer.open{display:block;}
.mob-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);}
.mob-menu{position:absolute;top:0;left:0;bottom:0;width:250px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:10px 8px;gap:2px;overflow-y:auto;animation:sil .25s ease;}
@keyframes sil{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.mob-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:var(--r);border:none;background:transparent;color:var(--txt2);font-family:var(--fd);font-size:17px;font-weight:700;letter-spacing:.3px;transition:all .2s;text-align:left;width:100%;}
.mob-item:hover{background:var(--s2);color:var(--txt);}
.mob-item.on{background:var(--s3);color:var(--acc);}
.mob-item svg{width:17px;height:17px;flex-shrink:0;}
.mob-div{height:1px;background:var(--bd);margin:5px 8px;}

/* BODY */
.app-body{flex:1;display:flex;overflow:hidden;}

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
.sidebar{
  width:var(--sw);flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-search{padding:10px;border-bottom:1px solid var(--bd);}
.sb-search input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:8px 12px;color:var(--txt);font-size:13px;outline:none;transition:border-color .2s;}
.sb-search input:focus{border-color:var(--acc);}
.sb-search input::placeholder{color:var(--txt3);}
.sb-cats{display:flex;gap:4px;padding:8px 10px;overflow-x:auto;border-bottom:1px solid var(--bd);}
.sb-cats::-webkit-scrollbar{height:0;}
.cat-pill{flex-shrink:0;padding:4px 9px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--txt3);font-family:var(--fd);font-size:11px;font-weight:600;transition:all .2s;white-space:nowrap;}
.cat-pill:hover{border-color:var(--bd2);color:var(--txt2);}
.cat-pill.on{background:var(--acc);border-color:var(--acc);color:#000;}
.sb-info{padding:5px 12px;font-size:11px;color:var(--txt3);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.sb-sort{background:none;border:1px solid var(--bd);border-radius:5px;color:var(--txt3);font-size:10px;padding:2px 6px;transition:all .2s;}
.sb-sort:hover{color:var(--txt2);border-color:var(--bd2);}
.ch-list{flex:1;overflow-y:auto;position:relative;padding:0 6px; -webkit-overflow-scrolling: touch;}
.ch-item{display:flex;align-items:center;gap:8px;padding:8px 8px;border-radius:var(--r);cursor:pointer;transition:background .15s;border:1px solid transparent;margin-bottom:2px;}
.ch-item:hover{background:var(--s2);}
.ch-item.on{background:rgba(0,212,255,.07);border-color:rgba(0,212,255,.25);}
.ch-logo{width:38px;height:38px;border-radius:var(--r);flex-shrink:0;background:var(--s3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;}
.ch-logo img{width:100%;height:100%;object-fit:contain;}
.ch-meta{flex:1;min-width:0;}
.ch-name{font-size:12px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-grp{font-size:10px;color:var(--txt3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-fav{background:none;border:none;color:var(--txt3);font-size:14px;padding:2px 4px;border-radius:4px;transition:all .15s;flex-shrink:0;opacity:0;}
.ch-item:hover .ch-fav{opacity:1;}
.ch-fav.on{opacity:1;color:var(--acc3);}
.ch-dot{width:6px;height:6px;border-radius:50%;background:var(--acc4);flex-shrink:0;animation:bl 1.5s ease-in-out infinite;}
.vsp{width:1px;pointer-events:none;}
.sb-load{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--txt3);}
.spin{width:30px;height:30px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ══════════════════════════════════════════
   MAIN PANEL
══════════════════════════════════════════ */
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sub-page{display:none;flex:1;flex-direction:column;overflow:hidden;}
.sub-page.on{display:flex !important;}

/* ══════════════════════════════════════════
   PLAYER PAGE
══════════════════════════════════════════ */
.player-wrap {
  flex: 1;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 0;
  width: 100%;
  height: 100%;
}

#mainVid {
  width: 100%;
  height: 100%;
  object-fit: fill;
  background: #000;
}

.p-empty {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--txt3);
  pointer-events: none;
}

.p-empty-icon { font-size: 54px; opacity: .2; }
.p-empty h2 { font-family: var(--fd); font-size: 24px; letter-spacing: 2px; opacity: .35; }
.p-empty p { font-size: 12px; opacity: .4; text-align: center; }

.p-buf {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.45);
  pointer-events: none;
}
.p-buf.on { display: flex; }

.buf-ring {
  width: 52px;
  height: 52px;
  border: 3px solid rgba(0,212,255,.15);
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: sp .65s linear infinite;
}

/* OVERLAY */
.p-ov {
  position: absolute;
  inset: 0;
  display: flex !important;
  flex-direction: column;
  justify-content: space-between;
  opacity: 1 !important;
  visibility: visible !important;
  pointer-events: none !important;
}

.p-ov-top {
  background: linear-gradient(to bottom, rgba(0,0,0,.8), transparent);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: auto !important;
}

.p-ov-info { display: flex; align-items: center; gap: 8px; }

.p-live-badge {
  background: var(--acc2);
  color: #fff;
  font-family: var(--fd);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 2px 8px;
  border-radius: 4px;
  box-shadow: 0 0 10px var(--glowr);
  animation: lbp 1.5s ease-in-out infinite;
}
@keyframes lbp {
  0%, 100% { box-shadow: 0 0 10px var(--glowr) }
  50% { box-shadow: 0 0 22px rgba(255,62,62,.7) }
}

.p-ch-title {
  font-family: var(--fd);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
  text-shadow: 0 2px 8px rgba(0,0,0,.8);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 400px;
}

.p-ov-bot {
  background: rgba(0,0,0,0.85) !important;
  padding: 12px 16px;
  pointer-events: auto !important;
  position: absolute !important;
  bottom: 0 !important;
  left: 0 !important;
  right: 0 !important;
}

.p-ctrls { display: flex; align-items: center; gap: 8px; }

.p-play-btn {
  background: rgba(0,212,255,.2);
  border: 1px solid var(--acc);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--acc);
  transition: all .2s;
  flex-shrink: 0;
}
.p-play-btn:hover {
  background: var(--acc);
  color: #000;
  box-shadow: 0 0 18px var(--glow);
}
.p-play-btn svg { width: 17px; height: 17px; }

.vol-wrap { display: flex; align-items: center; gap: 6px; }
.vol-wrap button { background: none; border: none; padding: 3px; cursor: pointer; }
.vol-wrap svg { width: 14px; height: 14px; color: rgba(255,255,255,.6); }
.vol-slider {
  -webkit-appearance: none;
  width: 72px;
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,.25);
  cursor: pointer;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--acc);
}

.p-time {
  font-family: var(--fd);
  font-size: 14px;
  color: rgba(255,255,255,.6);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.p-spc { flex: 1; }

.p-qual-wrap { position: relative; }
.p-qual-btn {
  background: rgba(0,0,0,.5);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: var(--r);
  color: rgba(255,255,255,.8);
  font-family: var(--fd);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 9px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all .2s;
}
.p-qual-btn:hover { background: rgba(255,255,255,.1); }
.p-qual-btn svg { width: 12px; height: 12px; }

.p-qual-drop {
  position: absolute;
  bottom: calc(100% + 8px);
  right: 0;
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: var(--r2);
  padding: 5px;
  min-width: 110px;
  display: none;
  flex-direction: column;
  gap: 1px;
  box-shadow: 0 8px 28px rgba(0,0,0,.6);
}
.p-qual-wrap:hover .p-qual-drop { display: flex; }

.p-qual-item {
  padding: 7px 10px;
  border-radius: var(--r);
  border: none;
  background: transparent;
  color: var(--txt2);
  font-size: 13px;
  text-align: left;
  transition: all .15s;
}
.p-qual-item:hover { background: var(--s3); color: var(--txt); }
.p-qual-item.on { color: var(--acc); }

/* EPG BAR */
.epg-bar{background:var(--s2);border-top:1px solid var(--bd);padding:6px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0;overflow-x:auto;}
.epg-bar::-webkit-scrollbar{height:0;}
.epg-lbl{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--acc);white-space:nowrap;flex-shrink:0;}
.epg-slot{display:flex;align-items:center;gap:7px;flex-shrink:0;background:var(--s3);border:1px solid var(--bd);border-radius:var(--r);padding:5px 10px;}
.epg-slot.live{border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.07);}
.epg-time{font-size:10px;color:var(--txt3);font-variant-numeric:tabular-nums;}
.epg-name{font-size:12px;font-weight:500;color:var(--txt2);}
.epg-slot.live .epg-name{color:var(--acc);}
.epg-pb{width:50px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden;}
.epg-pb-fill{height:100%;background:var(--acc);border-radius:2px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r);border:none;font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:.3px;transition:all .2s;white-space:nowrap;}
.btn svg{width:13px;height:13px;}
.btn-acc{background:linear-gradient(135deg,var(--acc),#0066ff);color:#000;box-shadow:0 0 14px var(--glow);}
.btn-acc:hover{transform:translateY(-1px);box-shadow:0 0 24px var(--glow);}
.btn-g{background:transparent;color:var(--txt2);border:1px solid var(--bd);}
.btn-g:hover{color:var(--txt);border-color:var(--bd2);}
.btn-red{background:linear-gradient(135deg,var(--acc2),#aa0000);color:#fff;box-shadow:0 0 12px var(--glowr);}

/* ══════════════════════════════════════════
   MOVIE PAGE
══════════════════════════════════════════ */
.movie-bar{background:var(--s1);border-bottom:1px solid var(--bd);padding:9px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.movie-bar-title{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--acc);letter-spacing:.5px;flex-shrink:0;}
.movie-wrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;}
#movieVid{width:100%;height:100%;object-fit:contain;background:#000;}
.movie-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--txt3);pointer-events:none;}
.movie-empty-icon{font-size:54px;opacity:.2;}
.movie-empty h2{font-family:var(--fd);font-size:24px;letter-spacing:2px;opacity:.35;}
.movie-empty p{font-size:12px;opacity:.4;text-align:center;max-width:260px;line-height:1.6;}
.movie-empty-btns{pointer-events:all;display:flex;gap:8px;margin-top:4px;}
.movie-buf{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);pointer-events:none;}
.movie-buf.on{display:flex;}

/* Movie overlay */
.movie-ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;transition:opacity .25s;pointer-events:none;}
.movie-wrap:hover .movie-ov,.movie-ov.vis{opacity:1;pointer-events:all;}
.movie-ov-inner{background:linear-gradient(to top,rgba(0,0,0,.9),transparent);padding:12px 18px 14px;}
.movie-title{font-family:var(--fd);font-size:17px;font-weight:700;color:#fff;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.movie-seek{position:relative;height:5px;background:rgba(255,255,255,.18);border-radius:3px;margin-bottom:12px;cursor:pointer;}
.movie-seek-buf{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.2);border-radius:3px;pointer-events:none;}
.movie-seek-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc3));border-radius:3px;pointer-events:none;}
.movie-seek-thumb{position:absolute;top:50%;width:13px;height:13px;background:var(--acc);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 7px var(--glow);pointer-events:none;opacity:0;transition:opacity .2s;}
.movie-seek:hover .movie-seek-thumb{opacity:1;}
.movie-ctrls{display:flex;align-items:center;gap:8px;}
.movie-play-btn{background:rgba(0,212,255,.2);border:1px solid var(--acc);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--acc);transition:all .2s;flex-shrink:0;}
.movie-play-btn:hover { background:var(--acc); color:#000; }
.movie-play-btn svg{width:17px;height:17px;}
.movie-time{font-family:var(--fd);font-size:14px;color:rgba(255,255,255,.65);font-variant-numeric:tabular-nums;white-space:nowrap;}
.movie-speed{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);color:rgba(255,255,255,.8);font-family:var(--fd);font-size:12px;font-weight:600;padding:5px 7px;outline:none;}
.movie-speed option{background:var(--s2);}
.movie-lib{background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;max-height:130px;overflow-y:auto;padding:6px 10px;display:none;}
.movie-lib-title{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:flex;justify-content:space-between;}
.movie-lib-title button{background:none;border:none;color:var(--txt3);font-size:11px;cursor:pointer;}
.movie-lib-title button:hover{color:var(--acc2);}
.movie-lib-grid{display:flex;gap:6px;flex-wrap:wrap;}
.movie-lib-item{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:5px 9px;cursor:pointer;transition:all .2s;max-width:240px;}
.movie-lib-item:hover{background:var(--s3);border-color:var(--acc);}
.movie-lib-item.on{border-color:var(--acc);background:rgba(0,212,255,.07);}
.movie-lib-name{font-size:11px;font-weight:500;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.movie-lib-ext{font-size:10px;color:var(--txt3);}
.movie-lib-rm{background:none;border:none;color:var(--txt3);font-size:11px;cursor:pointer;padding:1px 3px;border-radius:3px;transition:all .15s;}
.movie-lib-rm:hover{color:var(--acc2);}

/* ══════════════════════════════════════════
   OTHER PAGES
══════════════════════════════════════════ */
.page-wrap{flex:1;overflow-y:auto;padding:18px;}
.page-title{font-family:var(--fd);font-size:26px;font-weight:800;letter-spacing:2px;margin-bottom:16px;}
.page-title span{color:var(--acc);}

/* FAVS */
.favs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.fav-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .25s;position:relative;}
.fav-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.4);}
.fav-logo{width:48px;height:48px;border-radius:var(--r);background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;margin-bottom:8px;}
.fav-logo img{width:100%;height:100%;object-fit:contain;}
.fav-name{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:2px;}
.fav-grp{font-size:11px;color:var(--txt3);}
.fav-rm{position:absolute;top:8px;right:8px;background:rgba(255,62,62,.1);border:1px solid rgba(255,62,62,.2);border-radius:5px;color:var(--acc2);font-size:11px;padding:3px 6px;opacity:0;transition:all .2s;}
.fav-card:hover .fav-rm{opacity:1;}
.fav-rm:hover{background:rgba(255,62,62,.3);}
.favs-empty{text-align:center;color:var(--txt3);padding:50px 0;}
.favs-empty .fi{font-size:44px;opacity:.2;margin-bottom:10px;}

/* ── ADMIN URL BAR (TAMAMEN KALDIRILDI VE BLOKE EDİLDİ) ── */
.admin-bar, #adminBar {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  height: 0 !important;
  padding: 0 !important;
  margin: 0 !important;
  overflow: hidden !important;
  position: absolute !important;
  pointer-events: none !important;
}

/* ── ADMIN PANELİ ANA DÜZENLEYİCİSİ ── */
#pageAdmin {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  box-sizing: border-box;
  display: none;
}
#pageAdmin.on { display: block !important; }
#pageAdmin .page-wrap { padding: 20px; max-width: 1200px; margin: 0 auto; box-sizing: border-box; }

/* ── ADMIN ── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 18px; }
.stat-card { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--r2); padding: 16px; position: relative; overflow: hidden; }

<body>

<script>
// PROXY_BASE güncelle (runtime)
function setProxyBase(val){
  window._proxyBase = val;
  toast(val ? '✅ Proxy kaydedildi: '+val : '🔴 Proxy kaldırıldı', '🔗');
}

// Runtime proxy override
function proxyUrlRuntime(url){
  const base = window._proxyBase || PROXY_BASE || ls('vg_proxy') || '';
  if(base && url.startsWith('http://')){
    return base + encodeURIComponent(url);
  }
  return url;
}

// Dinamik ve güvenli tüm verileri silme fonksiyonu
async function clearAllData(){
  if(!confirm('Tüm veriler silinsin mi? Bu işlem geri alınamaz!')) return;
  localStorage.clear();
  if (typeof idbSet === 'function') {
    await idbSet('pl', []); 
    await idbSet('plt', 0);
  }
  location.reload();
}

// ════════════════════════════════════════
// KULLANICI YÖNETİMİ
// ════════════════════════════════════════
function renderUserList(){
  const el=document.getElementById('userList'); if(!el) return;
  const users=getUsers();
  el.innerHTML='';
  users.forEach(function(u){
    const row=document.createElement('div');
    row.className='user-row';

    const unDiv=document.createElement('div');
    unDiv.style.cssText='font-size:13px;font-weight:500';
    unDiv.textContent=u.username;

    const roleSpan=document.createElement('span');
    roleSpan.className='user-role '+u.role;
    roleSpan.textContent=u.role;

    const nmDiv=document.createElement('div');
    nmDiv.style.cssText='font-size:12px;color:var(--txt2)';
    nmDiv.textContent=u.name;

    let actionEl;
    if(u.username==='admin'){
      actionEl=document.createElement('span');
      actionEl.style.cssText='font-size:11px;color:var(--txt3)';
      actionEl.textContent='—';
    } else {
      actionEl=document.createElement('button');
      actionEl.className='user-del';
      actionEl.textContent='Sil';
      actionEl.onclick=(function(username){
        return function(){ adminDelUser(username); };
      })(u.username);
    }

    row.appendChild(unDiv);
    row.appendChild(roleSpan);
    row.appendChild(nmDiv);
    row.appendChild(actionEl);
    el.appendChild(row);
  });
}

function adminAddUser(){
  const un=(document.getElementById('uN').value||'').trim();
  const nm=(document.getElementById('uNm').value||'').trim();
  const pw=document.getElementById('uP').value;
  const ro=document.getElementById('uR').value;
  if(!un||!nm||!pw){ toast('Tüm alanları doldurun','⚠️'); return; }
  const users=getUsers();
  if(users.find(u=>u.username===un)){ toast('Bu kullanıcı adı alınmış','⚠️'); return; }
  users.push({username:un,name:nm,password:pw,role:ro});
  saveUsers(users);
  ['uN','uNm','uP'].forEach(id=>document.getElementById(id).value='');
  renderUserList(); updateAdminStats();
  toast('✅ Kullanıcı eklendi: '+un,'✅');
}

function adminDelUser(username){
  if(!confirm(username+' silinsin mi?')) return;
  saveUsers(getUsers().filter(u=>u.username!==username));
  renderUserList(); updateAdminStats();
  toast('Kullanıcı silindi','🗑️');
}

// ════════════════════════════════════════
// GRUP DÜZENLEME
// ════════════════════════════════════════
function renderGroupList(){
  const el=document.getElementById('groupList'); if(!el) return;
  const chs=merged();
  const groups={};
  chs.forEach(function(c){ const g=c.grp||'Diğer'; groups[g]=(groups[g]||0)+1; });
  el.innerHTML='';
  Object.entries(groups).sort(function(a,b){ return b[1]-a[1]; }).forEach(function(entry){
    const g=entry[0], cnt=entry[1];
    const alias=groupAliases[g]||g;
    const row=document.createElement('div'); row.className='grp-item';

    const nameSpan=document.createElement('span'); nameSpan.className='grp-name';
    nameSpan.textContent=grpEmoji(g)+' '+alias;
    if(alias!==g){
      const small=document.createElement('small');
      small.style.color='var(--txt3)'; small.textContent=' ('+g+')';
      nameSpan.appendChild(small);
    }

    const cntSpan=document.createElement('span'); cntSpan.className='grp-count';
    cntSpan.textContent=cnt+' kanal';

    const inp=document.createElement('input'); inp.className='grp-rename-input';
    inp.placeholder='Yeniden adlandır…'; inp.value=(alias!==g?alias:'');

    const btn=document.createElement('button'); btn.className='btn btn-g';
    btn.style.cssText='font-size:12px;padding:5px 10px'; btn.textContent='Kaydet';
    btn.onclick=(function(grp,input){ return function(){ saveGroupAlias(grp,input.value); }; })(g,inp);

    row.appendChild(nameSpan); row.appendChild(cntSpan);
    row.appendChild(inp); row.appendChild(btn);
    el.appendChild(row);
  });
}

function saveGroupAlias(grp, newName){
  newName=newName.trim();
  if(!newName||newName===grp){ delete groupAliases[grp]; } else { groupAliases[grp]=newName; }
  lss('vg_grp_alias',JSON.stringify(groupAliases));
  renderGroupList(); renderChannels();
  toast('✅ Grup adı güncellendi','✅');
}

// ════════════════════════════════════════
// ADMIN LOGIN
// ════════════════════════════════════════
function openAdminLogin(){
  if(window.isAdmin){
    goPage('admin'); return;
  }
  document.getElementById('adminPwErr').style.display='none';
  document.getElementById('adminPwInput').value='';
  openModal('adminLoginModal');
  setTimeout(()=>document.getElementById('adminPwInput').focus(),200);
}

function doAdminLogin(){
  const pw=document.getElementById('adminPwInput').value;
  if(pw===ADMIN_PW){
    window.isAdmin=true;
    if(window.curUser) window.curUser.role='admin';
    document.getElementById('adminNavBtn').style.display='flex';
    document.getElementById('mobAdminBtn').style.display='flex';
    document.getElementById('adminLoginBtn').classList.add('on');
    document.getElementById('adminLoginTxt').textContent='ADMİN ✓';
    closeModal('adminLoginModal');
    
    // Admin panel görünümünü aktifleştir
    const pageAdmin = document.getElementById('pageAdmin');
    if(pageAdmin) pageAdmin.classList.add('on');
    
    goPage('admin');
    toast('✅ Admin girişi başarılı!','🔐');
  } else {
    document.getElementById('adminPwErr').style.display='block';
  }
}

// ── KLAVYE KISAYOLLARI VE KORUMA ──
function syncVolumeUI(volume) {
  const slider = document.querySelector('.vol-slider');
  if (slider) slider.value = volume * 100;
}

document.addEventListener('keydown', e => {
  if(e.key==='F12'){ e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey)&&['u','U','s','S'].includes(e.key)){ e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['i','I','j','J','c','C'].includes(e.key)){ e.preventDefault(); return; }

  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  
  switch(e.code){
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'KeyF': doFS(); break;
    case 'KeyM': toggleMute(); break;
    case 'KeyR': restartStream(); break;
    case 'KeyP': doPiP(); break;
    case 'KeyN': nextCh(1); break;
    case 'KeyB': nextCh(-1); break;
    case 'ArrowUp': 
      e.preventDefault(); 
      { 
        const v=document.getElementById('mainVid'); 
        if(v) {
          v.volume=Math.min(1,v.volume+.05); 
          syncVolumeUI(v.volume);
        }
      } 
      break;
    case 'ArrowDown': 
      e.preventDefault(); 
      { 
        const v=document.getElementById('mainVid'); 
        if(v) {
          v.volume=Math.max(0,v.volume-.05); 
          syncVolumeUI(v.volume);
        }
      } 
      break;
  }
});

function nextCh(dir){
  const all=merged(); if(!all.length) return;
  const idx=curCh?all.findIndex(c=>c.id===curCh.id):-1;
  let n=idx+dir; if(n<0) n=all.length-1; if(n>=all.length) n=0;
  goChannel(all[n]);
}

// Sağ tık, Seçim, Sürükleme Engelleme
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  e.preventDefault();
});
document.addEventListener('copy', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  e.preventDefault();
});
document.addEventListener('dragstart', e => e.preventDefault());

// Konsol uyarısı (Interval optimizasyonu)
setInterval(() => {
  try{
    console.warn('%c⛔ DURUN!', 'color:red;font-size:40px;font-weight:bold');
    console.warn('%cBu alan geliştiriciler içindir. Kodu kopyalamak yasaktır.', 'color:orange;font-size:16px');
  }catch{}
}, 2000);
</script>

<script>
// Tablet/Mobil Cihazlar Otomatik Oynatma Politikası Çözümü (Promise Tabanlı)
document.addEventListener("DOMContentLoaded", () => {
  const mainVideo = document.getElementById('mainVid');
  if (!mainVideo) return;

  document.addEventListener('click', (event) => {
    const targetChItem = event.target.closest('.ch-item');
    if (targetChItem) {
      setTimeout(() => {
        const playPromise = mainVideo.play();
        if (playPromise !== undefined) {
          playPromise.catch((error) => {
            console.warn("Otomatik oynatma kısıtlandı, ses kapatılarak devam ediliyor...", error);
            mainVideo.muted = true;
            mainVideo.play().catch(e => console.error("Muted oynatma da başarısız:", e));
          });
        }
      }, 500); 
    }
  });
});
</script>
